<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predict | Student Performance Predictor</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">SPP</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="predict.html" class="active">Predict</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
    </ul>
  </nav>

  <main class="container">
    <section class="form-section">
      <h1>Predict Your Score</h1>
      <p class="subtitle">Fill in the details below to get your predicted score.</p>

      <form id="predict-form" class="form">
        <div class="form-group">
          <label for="study_hours">Study Hours</label>
          <input type="number" id="study_hours" name="study_hours" min="0" max="24" step="0.1" required />
        </div>

        <div class="form-group">
          <label for="sleep_hours">Sleep Hours</label>
          <input type="number" id="sleep_hours" name="sleep_hours" min="0" max="24" step="0.1" required />
        </div>

        <div class="form-group">
          <label for="attendance">Attendance (%)</label>
          <input type="number" id="attendance" name="attendance" min="0" max="100" step="0.1" required />
        </div>

        <div class="form-group">
          <label for="previous_marks">Previous Marks</label>
          <input type="number" id="previous_marks" name="previous_marks" min="0" max="100" step="0.1" required />
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">Predict</button>
      </form>

      <div id="result" class="result hidden"></div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2025 Student Performance Predictor</p>
  </footer>

  <script src="predict.js"></script>
</body>
</html>
