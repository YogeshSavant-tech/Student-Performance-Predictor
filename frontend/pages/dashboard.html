<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Student Performance Predictor</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">SPP</div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/predict">Predict</a></li>
      <li><a href="/dashboard" class="active">Dashboard</a></li>
    </ul>
  </nav>

  <main class="container">
    <h1>Dashboard</h1>
    <p class="subtitle">Your prediction history and analytics.</p>

    <!-- Stats Cards -->
    <div id="stats-cards" class="stats-grid">
      <p class="muted">Loading stats...</p>
    </div>

    <!-- History Table -->
    <section class="history-section">
      <h2>Recent Predictions</h2>
      <div class="table-wrap">
        <table class="history-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Study Hrs</th>
              <th>Attendance</th>
              <th>Score</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
      </div>
      <p id="empty-msg" class="muted" style="display:none; text-align:center; margin-top:1rem;">
        No predictions yet. <a href="/predict">Make your first prediction →</a>
      </p>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2025 Student Performance Predictor</p>
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
